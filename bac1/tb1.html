<script type="text/javascript">
    function insert() {
        console.log($("#post1").serialize())
        var data = $("#post1").serialize();
        if (data == "") {
            alert("提交不能为空:error");
            return false;
        } else {
            $.ajax({
                type: "POST",
                url: "./post.php",
                dataType: "text",
                async: false,
                data: $("#post1").serialize(),
                success: function (msg) {

                    alert("提交成功");


                },

                error: function (x, e) {

                    alert("提交失败"

                        +
                        x.responseText);
                },
            })
        }
    }
</script>
